<!DOCTYPE html>
<html>

<head>
    <title>Toppers Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card-box {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-4">
            🏆 Topper Analytics
        </h1>

        <a href="/dashboard" class="btn btn-primary mb-4">
            Back
        </a>

        <a href="/download-toppers" class="btn btn-success mb-4">
            Download Toppers Excel
        </a>

        <div class="card-box">

            <table class="table table-dark table-striped">

                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Total Marks</th>
                    </tr>
                </thead>

                <tbody id="topperTable"></tbody>

            </table>

        </div>

        <div class="card-box">

            <canvas id="topperChart"></canvas>

        </div>

    </div>

    <script>

        fetch('/analytics')
            .then(res => res.json())
            .then(data => {

                const table =
                    document.getElementById("topperTable");

                let rows = "";

                data.toppers_data.forEach(
                    (student, index) => {

                        rows += `
            <tr>
                <td>${index + 1}</td>
                <td>${student.name}</td>
                <td>${student.marks}</td>
            </tr>
            `;
                    }
                );

                table.innerHTML = rows;

                new Chart(
                    document.getElementById("topperChart"),
                    {
                        type: 'bar',

                        data: {

                            labels:
                                data.toppers_data.map(
                                    x => x.name
                                ),

                            datasets: [{
                                label: 'Total Marks',

                                data:
                                    data.toppers_data.map(
                                        x => x.marks
                                    )
                            }]
                        }
                    }
                );

            });

    </script>
</body>

</html>
