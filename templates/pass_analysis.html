<!DOCTYPE html>
<html>
<head>

<title>Pass Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
}

.card-box{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center">
📊 Pass Percentage Analysis
</h1>

<a href="/dashboard" class="btn btn-primary mt-3">
Back
</a>

<div class="row mt-4">

<div class="col-md-4">

<div class="card-box">

<h3>Total Students</h3>

<h1 id="total">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h3>Passed</h3>

<h1 id="passed">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h3>Failed</h3>

<h1 id="failed">0</h1>

</div>

</div>

</div>

<div class="card-box">

<canvas id="passChart"></canvas>

</div>

</div>

<script>

fetch('/analytics')
.then(res=>res.json())
.then(data=>{

document.getElementById("total").innerText=
data.total_students;

document.getElementById("passed").innerText=
data.passed_students;

document.getElementById("failed").innerText=
data.failed_students;

new Chart(
document.getElementById("passChart"),
{
type:'doughnut',

data:{
labels:["Passed","Failed"],

datasets:[{
data:[
data.passed_students,
data.failed_students
]
}]
}
});

});

</script>

</body>
</html>
