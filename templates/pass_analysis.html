<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorelytix - Pass Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --bg-1: #07111f;
            --bg-2: #0b1730;
            --bg-3: #111c3d;
            --card: rgba(18, 25, 44, 0.82);
            --border: rgba(255, 255, 255, 0.10);
            --text: #f8fafc;
            --muted: #b8c2d9;
            --blue: #3b82f6;
            --cyan: #22d3ee;
            --violet: #8b5cf6;
            --green: #22c55e;
            --red: #ef4444;
            --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.18), transparent 25%),
                radial-gradient(circle at 90% 20%, rgba(139, 92, 246, 0.18), transparent 25%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
        }

        .page-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffffff, #c4b5fd, #8b5cf6, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 30px;
        }

        .glass-card {
            background: linear-gradient(180deg,
                    rgba(22, 30, 52, 0.88),
                    rgba(16, 23, 40, 0.82));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            margin-top: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 22px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            height: 100%;
        }

        .stat-card h3 {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .stat-card h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
        }

        .btn-premium {
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: .3s ease;
            background: linear-gradient(90deg, #2563eb, #22d3ee);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            color: white;
        }

        canvas {
            background: linear-gradient(180deg, #f8fafc, #eef2ff);
            border-radius: 18px;
            padding: 12px;
        }

        @media(max-width:768px) {
            .page-title {
                font-size: 2rem;
            }

            .btn-premium {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h1 class="page-title">📊 Pass Percentage Analysis</h1>
        <p class="page-subtitle">Overall pass, fail and success ratio insights</p>

        <div class="text-center mb-4">
            <a href="/dashboard" class="btn-premium">← Back to Dashboard</a>
        </div>

        <div class="row g-4 mt-2">

            <div class="col-md-4">
                <div class="stat-card glass-card">
                    <h3>Total Students</h3>
                    <h1 id="total">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-card glass-card">
                    <h3>Passed</h3>
                    <h1 id="passed" style="color:#22c55e;">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-card glass-card">
                    <h3>Failed</h3>
                    <h1 id="failed" style="color:#ef4444;">0</h1>
                </div>
            </div>

        </div>

        <div class="glass-card">
            <h4 class="mb-4">📈 Pass vs Fail Chart</h4>
            <canvas id="passChart"></canvas>
        </div>

    </div>

    <script>
        fetch('/analytics')
            .then(res => res.json())
            .then(data => {
                document.getElementById("total").innerText = data.total_students;
                document.getElementById("passed").innerText = data.passed_students;
                document.getElementById("failed").innerText = data.failed_students;

                new Chart(document.getElementById("passChart"), {
                    type: 'doughnut',
                    data: {
                        labels: ["Passed", "Failed"],
                        datasets: [{
                            data: [data.passed_students, data.failed_students],
                            backgroundColor: ['#22c55e', '#ef4444'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#111827'
                                }
                            }
                        }
                    }
                });
            });
    </script>

</body>

</html>
