<!DOCTYPE html>
<html>
<head>

<title>Subject Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
}

.card-box{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<h1 class="text-center">
📚 Subject Wise Performance
</h1>

<a href="/dashboard" class="btn btn-primary mt-3">
Back
</a>

<div class="card-box">

<canvas id="subjectChart"></canvas>

</div>

</div>

<script>

fetch('/analytics')
.then(res=>res.json())
.then(data=>{

new Chart(
document.getElementById("subjectChart"),
{
type:'bar',

data:{

labels:
data.subject_data.map(
x=>x.subject
),

datasets:[{

label:"Average Marks",

data:
data.subject_data.map(
x=>x.average
)

}]
}
});

});

</script>

</body>
</html>
