<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Subject Wise Toppers
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        .title{
            text-align:center;
            margin-top:30px;
            margin-bottom:30px;
            font-size:3rem;
            font-weight:bold;
        }

        .card-box{

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:25px;

            margin-top:20px;
        }

        table{
            color:white !important;
        }

        .btn-download{
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="container py-4">

    <h1 class="title">
        📚 Subject Wise Toppers
    </h1>

    <div class="text-center mb-4">

        <a href="/dashboard"
           class="btn btn-primary">

            Back To Dashboard

        </a>

    </div>

    <div class="card-box">

        <table
            class="table table-dark table-striped table-hover">

            <thead>

            <tr>

                <th>Subject</th>

                <th>Topper Name</th>

                <th>Marks</th>

                <th>Download</th>

            </tr>

            </thead>

            <tbody id="subjectTopperTable">

            </tbody>

        </table>

    </div>

</div>

<script>

fetch('/analytics')

.then(response => response.json())

.then(data => {

    const table =
        document.getElementById(
            "subjectTopperTable"
        );

    data.subject_toppers.forEach(item => {

        table.innerHTML += `

        <tr>

            <td>
                ${item.subject}
            </td>

            <td>
                ${item.name}
            </td>

            <td>
                ${item.marks}
            </td>

            <td>

                <a
                href="/download-subject/${item.subject}"

                class="btn btn-success btn-sm btn-download">

                Download Excel

                </a>

            </td>

        </tr>

        `;

    });

})

.catch(error => {

    console.log(error);

    alert(
        "Unable to load subject toppers."
    );

});

</script>

</body>

</html>
