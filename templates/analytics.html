```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VTU Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        .title {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
            font-size: 3rem;
            font-weight: bold;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .topper-card {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
        }

        .btn-custom {
            border-radius: 12px;
            margin: 5px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>

</head>

<body>

    <div class="container py-4">

        <h1 class="title">
            🚀 VTU Result Xalytor Dashboard
        </h1>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="stat-card">
                    <div id="total" class="stat-number">0</div>
                    <div>Total Students</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <div id="passed" class="stat-number text-success">0</div>
                    <div>Passed</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <div id="failed" class="stat-number text-danger">0</div>
                    <div>Failed</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <div id="pass" class="stat-number text-info">0%</div>
                    <div>Pass Percentage</div>
                </div>
            </div>

        </div>

        <div class="topper-card">

            <h3>🏆 Class Topper</h3>

            <h2 id="topperName">Loading...</h2>

            <h5 id="topperMarks">Marks : 0</h5>

        </div>

        <div class="row">

            <div class="col-md-6">

                <div class="chart-card">

                    <h4 class="mb-3">
                        Pass vs Fail Analysis
                    </h4>

                    <canvas id="resultChart"></canvas>

                </div>

            </div>

            <div class="col-md-6">

                <div class="chart-card">

                    <h4 class="mb-3">
                        Subject Wise Performance
                    </h4>

                    <canvas id="subjectChart"></canvas>

                </div>

            </div>

        </div>

        <div class="chart-card text-center">

            <h4>Quick Actions</h4>

            <a href="/" class="btn btn-primary btn-custom">
                Home
            </a>

            <a href="/download" class="btn btn-success btn-custom">
                Download Excel
            </a>

            <a href="/toppers" class="btn btn-warning btn-custom">
                Toppers List
            </a>

            <a href="/pass-analysis" class="btn btn-info btn-custom">
                Pass Analysis
            </a>

            <a href="/subject-analysis" class="btn btn-secondary btn-custom">
                Subject Analysis
            </a>

        </div>

    </div>

    <script>

        fetch('/analytics')
            .then(response => response.json())
            .then(data => {

                console.log(JSON.stringify(data, null, 2));

                document.getElementById("total").innerText =
                    data.total_students || 0;

                document.getElementById("total").innerText =
                    data.total_students || 0;

                document.getElementById("passed").innerText =
                    data.passed_students || 0;

                document.getElementById("failed").innerText =
                    data.failed_students || 0;

                document.getElementById("pass").innerText =
                    (data.pass_percentage || 0) + "%";

                document.getElementById("topperName").innerText =
                    data.topper_name || "N/A";

                document.getElementById("topperMarks").innerText =
                    "Marks : " + (data.topper_marks || 0);

                new Chart(
                    document.getElementById("resultChart"),
                    {
                        type: 'doughnut',
                        data: {
                            labels: ['Passed', 'Failed'],
                            datasets: [{
                                data: [
                                    data.passed_students,
                                    data.failed_students
                                ],
                                backgroundColor: [
                                    '#22c55e',
                                    '#ef4444'
                                ]
                            }]
                        }
                    }
                );

                if (data.subject_data) {

                    new Chart(
                        document.getElementById("subjectChart"),
                        {
                            type: 'bar',
                            data: {
                                labels: data.subject_data.map(
                                    x => x.subject
                                ),
                                datasets: [{
                                    label: 'Average Marks',
                                    data: data.subject_data.map(
                                        x => x.average
                                    ),
                                    backgroundColor: '#3b82f6'
                                }]
                            }
                        }
                    );

                }

            })
            .catch(error => {

                console.log(error);

                alert("Analytics data not available.");

            });

    </script>

</body>

</html>
```
